<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>哲綸的值班表</title>
    <!-- 引入 Google Fonts 與 FontAwesome 圖示 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #f97316; /* 橘色 */
            --primary-hover: #ea580c;
            --holiday-color: #ef4444; /* 假日紅 */
            --bg-color: #f1f5f9;
            --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -4px rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            font-family: 'Noto Sans TC', sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: #1e293b;
            padding: 20px 10px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: #ffffff;
            padding: 24px;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
        }

        /* 頂部標題 */
        .title-section {
            text-align: center;
            margin-bottom: 24px;
        }

        .title-section h1 {
            font-size: 28px;
            color: #0f172a;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .title-section h1 i {
            color: var(--primary-color);
        }

        /* 控制面板：切換年份、月份、班別 */
        .control-panel {
            background-color: #f8fafc;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            align-items: center;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .control-group label {
            font-size: 13px;
            font-weight: 500;
            color: #64748b;
        }

        .select-input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            background-color: #ffffff;
            font-size: 15px;
            color: #334155;
            outline: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .select-input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.15);
        }

        /* 月份微調按鈕列 */
        .navigation-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .btn-nav {
            background-color: #ffffff;
            color: #334155;
            border: 1px solid #cbd5e1;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            user-select: none;
        }

        .btn-nav:hover {
            background-color: #f8fafc;
            border-color: #94a3b8;
        }

        .current-display-text {
            font-size: 20px;
            font-weight: 700;
            color: #0f172a;
        }

        /* 日曆網格區 */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-bottom: 24px;
        }

        /* 星期標頭 */
        .week-header {
            font-weight: 700;
            color: #64748b;
            padding: 10px 0;
            text-align: center;
            font-size: 14px;
        }

        .week-header.weekend {
            color: var(--holiday-color);
        }

        /* 日期單元格 */
        .day-cell {
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            min-height: 85px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .day-cell:hover {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .day-cell.other-month {
            opacity: 0.4;
            background-color: #f8fafc;
        }

        .day-num-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
        }

        .day-num {
            font-size: 15px;
            font-weight: 700;
            color: #334155;
        }

        .day-cell.is-holiday .day-num {
            color: var(--holiday-color);
        }

        /* 國定節日標記文字 */
        .holiday-label {
            font-size: 10px;
            color: var(--holiday-color);
            background-color: #fef2f2;
            padding: 1px 4px;
            border-radius: 4px;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* 今天日期的外框 */
        .day-cell.is-today {
            border: 2px solid #3b82f6;
            background-color: #eff6ff;
        }

        /* === 值班標籤樣式 (全新配色) === */
        .duty-tag {
            font-size: 13px;
            padding: 4px 6px;
            border-radius: 6px;
            font-weight: 700;
            text-align: center;
            width: 100%;
            margin-top: 6px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
        }

        /* 一值：白底紅字 */
        .duty-one {
            background-color: #ffffff;
            color: #ef4444;
            border: 1.5px solid #fec2c2;
        }

        /* 二值：白底深藍字 */
        .duty-two {
            background-color: #ffffff;
            color: #1e3a8a;
            border: 1.5px solid #bfdbfe;
        }

        /* 三值：白底綠字 */
        .duty-three {
            background-color: #ffffff;
            color: #10b981;
            border: 1.5px solid #a7f3d0;
        }

        /* 空班：橘底白字 */
        .duty-empty {
            background-color: #f97316;
            color: #ffffff;
            border: 1.5px solid #f97316;
        }

        /* 圖例說明區 */
        .legend-section {
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #475569;
        }

        .legend-color {
            width: 32px;
            height: 22px;
            border-radius: 4px;
            display: inline-block;
        }

        /* 手機板排版優化 */
        @media (max-width: 600px) {
            .container {
                padding: 16px;
            }
            .title-section h1 {
                font-size: 22px;
            }
            .day-cell {
                min-height: 70px;
                padding: 4px;
            }
            .day-num {
                font-size: 12px;
            }
            .holiday-label {
                display: none; /* 手機畫面過小，隱藏節日文字僅保留紅字標記 */
            }
            .duty-tag {
                font-size: 11px;
                padding: 2px 4px;
            }
            .current-display-text {
                font-size: 16px;
            }
            .btn-nav {
                padding: 8px 12px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 標題 -->
    <div class="title-section">
        <h1><i class="fa-solid fa-calendar-days"></i> 哲綸的值班表</h1>
    </div>

    <!-- 控制選單面板 -->
    <div class="control-panel">
        <div class="control-group">
            <label for="selectTeam"><i class="fa-solid fa-users"></i> 選擇班別</label>
            <select id="selectTeam" class="select-input" onchange="onControlChange()">
                <option value="A">A 班 (哲綸)</option>
                <option value="B">B 班</option>
                <option value="C">C 班</option>
                <option value="D">D 班</option>
            </select>
        </div>
        <div class="control-group">
            <label for="selectYear"><i class="fa-solid fa-calendar"></i> 年份</label>
            <select id="selectYear" class="select-input" onchange="onControlChange()">
                <!-- JS 動態生成年份 -->
            </select>
        </div>
        <div class="control-group">
            <label for="selectMonth"><i class="fa-solid fa-calendar-week"></i> 月份</label>
            <select id="selectMonth" class="select-input" onchange="onControlChange()">
                <!-- JS 動態生成月份 -->
            </select>
        </div>
    </div>

    <!-- 快速切換與標題顯示 -->
    <div class="navigation-row">
        <button class="btn-nav" onclick="changeMonth(-1)">
            <i class="fa-solid fa-chevron-left"></i> 上個月
        </button>
        <div class="current-display-text" id="displayTitle">2026 年 05 月</div>
        <button class="btn-nav" onclick="changeMonth(1)">
            下個月 <i class="fa-solid fa-chevron-right"></i>
        </button>
    </div>

    <!-- 月曆網格 -->
    <div class="calendar-grid" id="calendarGrid">
        <!-- 星期與日期格會在此渲染 -->
    </div>

    <!-- 圖例 -->
    <div class="legend-section">
        <div class="legend-item">
            <span class="legend-color duty-one"></span> 一值 (紅字)
        </div>
        <div class="legend-item">
            <span class="legend-color duty-two"></span> 二值 (藍字)
        </div>
        <div class="legend-item">
            <span class="legend-color duty-three"></span> 三值 (綠字)
        </div>
        <div class="legend-item">
            <span class="legend-color duty-empty"></span> 空班 (橘底)
        </div>
    </div>
</div>

<script>
    // 1. 值班基礎設定
    const START_DATE = new Date(2026, 4, 20); // 2026/05/20

    // 四個班別的 12 天排班循環表
    const TEAM_CYCLES = {
        'A': ["空班", "三值", "三值", "三值", "空班", "二值", "二值", "二值", "一值", "一值", "一值", "空班"],
        'B': ["一值", "一值", "空班", "空班", "三值", "三值", "三值", "空班", "二值", "二值", "二值", "一值"],
        'C': ["二值", "二值", "一值", "一值", "一值", "空班", "空班", "三值", "三值", "三值", "空班", "二值"],
        'D': ["三值", "空班", "二值", "二值", "二值", "一值", "一值", "一值", "空班", "空班", "三值", "三值"]
    };

    // 2. 2026 年國定假日與特殊補班日 (行政院人事行政總處公告網址核對資料)
    const holidays2026 = {
        '01-01': '元旦',
        '02-13': '小年夜', '02-14': '除夕', '02-15': '春節', '02-16': '春節', '02-17': '春節', '02-18': '春節',
        '02-27': '調整放假', '02-28': '和平紀念日',
        '04-02': '調整放假', '04-03': '兒童節', '04-04': '清明節',
        '05-01': '勞動節',
        '06-19': '端午節',
        '09-25': '中秋節',
        '10-09': '調整放假', '10-10': '國慶日'
    };
    const workdays2026 = ['02-07', '04-11', '10-17'];

    // 當前日曆聚焦的狀態
    let currentYear = 2026;
    let currentMonth = 4; // 0代表1月, 4代表5月
    let currentTeam = 'A';

    const weekLabels = ['日', '一', '二', '三', '四', '五', '六'];

    // 頁面初始化
    window.onload = function() {
        initSelectors();
        renderCalendar();
    };

    // 動態建構下拉選單選項
    function initSelectors() {
        const yearSelect = document.getElementById('selectYear');
        const monthSelect = document.getElementById('selectMonth');

        // 生成 2024 至 2030 年選項
        for (let y = 2024; y <= 2030; y++) {
            const opt = document.createElement('option');
            opt.value = y;
            opt.innerText = `${y} 年`;
            if (y === currentYear) opt.selected = true;
            yearSelect.appendChild(opt);
        }

        // 生成 1 至 12 月選項
        for (let m = 0; m < 12; m++) {
            const opt = document.createElement('option');
            opt.value = m;
            opt.innerText = `${m + 1} 月`;
            if (m === currentMonth) opt.selected = true;
            monthSelect.appendChild(opt);
        }
    }

    // 處理下拉選單手動切換事件
    function onControlChange() {
        currentTeam = document.getElementById('selectTeam').value;
        currentYear = parseInt(document.getElementById('selectYear').value);
        currentMonth = parseInt(document.getElementById('selectMonth').value);
        renderCalendar();
    }

    // 更新選單組件所顯示的值（用於同步前後頁按鈕）
    function syncSelectors() {
        document.getElementById('selectYear').value = currentYear;
        document.getElementById('selectMonth').value = currentMonth;
        document.getElementById('selectTeam').value = currentTeam;
    }

    // 計算當日值班狀態
    function getDuty(date, team) {
        // 標準化至午夜，消除日光節約與時間差影響
        const dStart = new Date(START_DATE.getFullYear(), START_DATE.getMonth(), START_DATE.getDate());
        const dTarget = new Date(date.getFullYear(), date.getMonth(), date.getDate());
        
        const diffTime = dTarget - dStart;
        const diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24));
        
        const cycle = TEAM_CYCLES[team];
        const len = cycle.length;
        
        // 確保負數能正確循環對齊
        const index = ((diffDays % len) + len) % len;
        return cycle[index];
    }

    // 判斷國定假日、補班或一般週末
    function checkHoliday(year, month, day, dayOfWeek) {
        if (year !== 2026) {
            // 2026以外年份預設以一般週六日判定
            return { isHoliday: (dayOfWeek === 0 || dayOfWeek === 6), name: '' };
        }
        
        const dateStr = `${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        
        if (workdays2026.includes(dateStr)) {
            return { isHoliday: false, name: '補班' };
        }
        if (holidays2026[dateStr]) {
            return { isHoliday: true, name: holidays2026[dateStr] };
        }
        
        return { isHoliday: (dayOfWeek === 0 || dayOfWeek === 6), name: '' };
    }

    // 渲染主月曆
    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        const displayTitle = document.getElementById('displayTitle');
        grid.innerHTML = '';

        // 更新上方的文字顯示
        const monthString = String(currentMonth + 1).padStart(2, '0');
        displayTitle.innerText = `${currentYear} 年 ${monthString} 月`;

        // 同步下拉選單數值
        syncSelectors();

        // 1. 生成星期列標頭
        weekLabels.forEach((label, index) => {
            const headerCell = document.createElement('div');
            headerCell.className = 'week-header';
            if (index === 0 || index === 6) {
                headerCell.classList.add('weekend');
            }
            headerCell.innerText = label;
            grid.appendChild(headerCell);
        });

        // 當月的第一天與最後一天
        const firstDay = new Date(currentYear, currentMonth, 1);
        const lastDay = new Date(currentYear, currentMonth + 1, 0);
        
        const startDayOfWeek = firstDay.getDay(); // 該月第一天是星期幾
        const totalDays = lastDay.getDate();     // 該月共有幾天

        // 2. 填充上個月的尾巴天數
        const prevMonthLastDay = new Date(currentYear, currentMonth, 0).getDate();
        for (let i = startDayOfWeek - 1; i >= 0; i--) {
            const prevDay = prevMonthLastDay - i;
            const targetDate = new Date(currentYear, currentMonth - 1, prevDay);
            createDayCell(targetDate, 'other-month');
        }

        // 3. 填充當月天數
        const today = new Date();
        for (let day = 1; day <= totalDays; day++) {
            const targetDate = new Date(currentYear, currentMonth, day);
            let classList = 'current-month';
            
            // 標示今天
            if (targetDate.toDateString() === today.toDateString()) {
                classList += ' is-today';
            }
            createDayCell(targetDate, classList);
        }

        // 4. 填充下個月的開頭天數（補滿最後一排）
        const totalRenderedCells = startDayOfWeek + totalDays;
        const nextMonthCellsNeeded = (7 - (totalRenderedCells % 7)) % 7;
        for (let day = 1; day <= nextMonthCellsNeeded; day++) {
            const targetDate = new Date(currentYear, currentMonth + 1, day);
            createDayCell(targetDate, 'other-month');
        }
    }

    // 建立個別日期格子 HTML
    function createDayCell(date, monthClass) {
        const grid = document.getElementById('calendarGrid');
        const cell = document.createElement('div');
        
        const day = date.getDate();
        const month = date.getMonth();
        const year = date.getFullYear();
        const dayOfWeek = date.getDay();

        cell.className = `day-cell ${monthClass}`;

        // 假日樣式判斷
        const holidayInfo = checkHoliday(year, month, day, dayOfWeek);
        if (holidayInfo.isHoliday) {
            cell.classList.add('is-holiday');
        }

        // 日期數字及假日文字容器
        const topRow = document.createElement('div');
        topRow.className = 'day-num-wrapper';
        
        const numSpan = document.createElement('span');
        numSpan.className = 'day-num';
        numSpan.innerText = day;
        topRow.appendChild(numSpan);

        // 如果有特定的節日或補班標籤
        if (holidayInfo.name) {
            const labelSpan = document.createElement('span');
            labelSpan.className = 'holiday-label';
            labelSpan.innerText = holidayInfo.name;
            topRow.appendChild(labelSpan);
        }
        cell.appendChild(topRow);

        // 值班班表標記
        const duty = getDuty(date, currentTeam);
        const dutyDiv = document.createElement('div');
        dutyDiv.className = 'duty-tag';

        // 依班別分配顏色樣式
        if (duty === '一值') {
            dutyDiv.classList.add('duty-one');
        } else if (duty === '二值') {
            dutyDiv.classList.add('duty-two');
        } else if (duty === '三值') {
            dutyDiv.classList.add('duty-three');
        } else {
            dutyDiv.classList.add('duty-empty');
        }

        dutyDiv.innerText = duty;
        cell.appendChild(dutyDiv);

        grid.appendChild(cell);
    }

    // 前後月份點擊切換
    function changeMonth(direction) {
        currentMonth += direction;
        if (currentMonth > 11) {
            currentMonth = 0;
            currentYear += 1;
        } else if (currentMonth < 0) {
            currentMonth = 11;
            currentYear -= 1;
        }
        renderCalendar();
    }
</script>

</body>
</html>
