<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>煜儒 的專屬值班表</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --holiday-color: #ff6b6b;
            --workday-color: #333;
            --bg-color: #f8f9fa;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .header h2 {
            margin: 0;
            color: #2c3e50;
        }
        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        .btn:hover {
            background-color: #357abd;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            text-align: center;
        }
        .week-day {
            font-weight: bold;
            color: #7f8c8d;
            padding: 10px 0;
        }
        .day-cell {
            background: #fdfdfd;
            border: 1px solid #eaeaea;
            border-radius: 8px;
            min-height: 70px;
            padding: 6px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }
        .day-num {
            font-size: 14px;
            font-weight: 600;
            text-align: left;
        }
        .day-cell.current-month {
            color: var(--workday-color);
        }
        .day-cell.other-month {
            color: #ccc;
            background: #fcfcfc;
        }
        .day-cell.is-holiday .day-num {
            color: var(--holiday-color);
        }
        .day-cell.today {
            border: 2px solid var(--primary-color);
            background-color: #ebf3fc;
        }
        .duty-tag {
            font-size: 12px;
            padding: 2px 4px;
            border-radius: 4px;
            font-weight: bold;
            text-align: center;
            margin-top: 4px;
        }
        /* 值班顏色區分 */
        .duty-empty { background-color: #e2e8f0; color: #4a5568; }
        .duty-three { background-color: #feebc8; color: #c05621; }
        .duty-two { background-color: #ebf8ff; color: #2b6cb0; }
        .duty-one { background-color: #fed7d7; color: #9b2c2c; }

        .holiday-name {
            font-size: 10px;
            color: var(--holiday-color);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .legend {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            font-size: 12px;
            justify-content: center;
            color: #666;
        }
        .legend-item { display: flex; align-items: center; gap: 4px; }
        .legend-color { width: 12px; height: 12px; border-radius: 3px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <button class="btn" onclick="changeMonth(-1)">◀ 上個月</button>
        <h2 id="monthTitle">2026 年 05 月</h2>
        <button class="btn" onclick="changeMonth(1)">下個月 ▶</button>
    </div>

    <div class="calendar-grid" id="calendarGrid">
        <!-- 星期欄位會由 JS 自動生成 -->
    </div>

    <div class="legend">
        <div class="legend-item"><div class="legend-color duty-one"></div>一值</div>
        <div class="legend-item"><div class="legend-color duty-two"></div>二值</div>
        <div class="legend-item"><div class="legend-color duty-three"></div>三值</div>
        <div class="legend-item"><div class="legend-color duty-empty"></div>空班</div>
    </div>
</div>

<script>
    // 1. 基礎排班參數設定
    const START_DATE = new Date(2026, 4, 20); // 2026/05/20 (月份從0開始算，4代表5月)
    const DUTY_CYCLE = [
        "空班", "三值", "三值", "三值", 
        "空班", "二值", "二值", "二值", 
        "一值", "一值", "一值", "空班"
    ];

    // 2. 依據行政院人事行政總處 2026年辦公日曆表進行國定假日與補班日標記
    // 格式為 'MM-DD': '節日名稱' (若為補班上班則註記補班)
    const holidays2026 = {
        '01-01': '元旦',
        '02-13': '小年夜', '02-14': '除夕', '02-15': '春節', '02-16': '春節', '02-17': '春節', '02-18': '春節',
        '02-27': '調整放假', '02-28': '和平紀念日',
        '04-02': '調整放假', '04-03': '兒童節', '04-04': '清明節',
        '05-01': '勞動節',
        '06-19': '端午節',
        '09-25': '中秋節',
        '10-09': '調整放假', '10-10': '國慶日'
    };
    
    // 2026年特定補班日（週六需要上班）
    const workdays2026 = ['02-07', '04-11', '10-17'];

    let currentYear = 2026;
    let currentMonth = 4; // 預設顯示 5 月

    const weekDaysLabels = ['日', '一', '二', '三', '四', '五', '六'];

    // 計算特定日期落在循環的哪一個班別
    function getDuty(date) {
        const diffTime = date.getTime() - START_DATE.getTime();
        const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
        
        if (diffDays < 0) {
            // 計算基準日之前的班表
            const cycleIndex = (DUTY_CYCLE.length + (diffDays % DUTY_CYCLE.length)) % DUTY_CYCLE.length;
            return DUTY_CYCLE[cycleIndex];
        } else {
            // 計算基準日之後的班表
            return DUTY_CYCLE[diffDays % DUTY_CYCLE.length];
        }
    }

    // 判斷是否為放假日
    function checkHoliday(year, month, day, dayOfWeek) {
        if (year !== 2026) return dayOfWeek === 0 || dayOfWeek === 6; // 非2026年以一般週末計
        
        const dateStr = `${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        if (workdays2026.includes(dateStr)) return { isHoliday: false, name: '補班' };
        if (holidays2026[dateStr]) return { isHoliday: true, name: holidays2026[dateStr] };
        return { isHoliday: dayOfWeek === 0 || dayOfWeek === 6, name: '' };
    }

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        const title = document.getElementById('monthTitle');
        grid.innerHTML = '';
        
        title.innerText = `${currentYear} 年 ${String(currentMonth + 1).padStart(2, '0')} 月`;

        // 生成星期標頭
        weekDaysLabels.forEach(day => {
            const el = document.createElement('div');
            el.className = 'week-day';
            el.innerText = day;
            grid.appendChild(el);
        });

        const firstDayOfMonth = new Date(currentYear, currentMonth, 1);
        const lastDayOfMonth = new Date(currentYear, currentMonth + 1, 0);
        
        const startWrapper = firstDayOfMonth.getDay();
        const totalDays = lastDayOfMonth.getDate();

        // 填補上個月的尾巴
        const prevMonthLastDay = new Date(currentYear, currentMonth, 0).getDate();
        for (let i = startWrapper - 1; i >= 0; i--) {
            const day = prevMonthLastDay - i;
            const targetDate = new Date(currentYear, currentMonth - 1, day);
            createDayCell(targetDate, 'other-month');
        }

        // 生成當月的日期
        const today = new Date();
        for (let day = 1; day <= totalDays; day++) {
            const targetDate = new Date(currentYear, currentMonth, day);
            let className = 'current-month';
            if (targetDate.toDateString() === today.toDateString()) {
                className += ' today';
            }
            createDayCell(targetDate, className);
        }

        // 填補下個月的開頭
        const totalCellsSoFar = startWrapper + totalDays;
        const remainingCells = (7 - (totalCellsSoFar % 7)) % 7;
        for (let day = 1; day <= remainingCells; day++) {
            const targetDate = new Date(currentYear, currentMonth + 1, day);
            createDayCell(targetDate, 'other-month');
        }
    }

    function createDayCell(date, monthClass) {
        const grid = document.getElementById('calendarGrid');
        const cell = document.createElement('div');
        const day = date.getDate();
        const month = date.getMonth();
        const year = date.getFullYear();
        const dayOfWeek = date.getDay();

        cell.className = `day-cell ${monthClass}`;

        // 處理節假日邏輯
        const holidayInfo = checkHoliday(year, month, day, dayOfWeek);
        if (holidayInfo.isHoliday) {
            cell.classList.add('is-holiday');
        }

        // 日期數字與節日標記
        const topRow = document.createElement('div');
        topRow.className = 'day-num';
        topRow.innerText = day;
        if (holidayInfo.name) {
            const holidayLabel = document.createElement('span');
            holidayLabel.className = 'holiday-name';
            holidayLabel.innerText = ` (${holidayInfo.name})`;
            topRow.appendChild(holidayLabel);
        }
        cell.appendChild(topRow);

        // 計算並加入班別
        const duty = getDuty(date);
        const dutyTag = document.createElement('div');
        dutyTag.className = 'duty-tag';
        
        if (duty === '一值') dutyTag.classList.add('duty-one');
        else if (duty === '二值') dutyTag.classList.add('duty-two');
        else if (duty === '三值') dutyTag.classList.add('duty-three');
        else dutyTag.classList.add('duty-empty');
        
        dutyTag.innerText = duty;
        cell.appendChild(dutyTag);

        grid.appendChild(cell);
    }

    function changeMonth(direction) {
        currentMonth += direction;
        if (currentMonth > 11) {
            currentMonth = 0;
            currentYear += 1;
        } else if (currentMonth < 0) {
            currentMonth = 11;
            currentYear -= 1;
        }
        renderCalendar();
    }

    // 初始化載入
    renderCalendar();
</script>

</body>
</html>
